<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recall — Voice Knowledge Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#10151B;
    --surface:#1A2129;
    --surface-2:#212A33;
    --border:#2A323C;
    --text:#E8ECEF;
    --text-dim:#8A94A0;
    --amber:#E8A33D;
    --teal:#4FD1C5;
    --violet:#C084FC;
    --danger:#E8654A;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans',sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }
  .display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ---- Top bar ---- */
  #topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    background:var(--surface);
    flex-shrink:0;
    gap:12px;
    flex-wrap:wrap;
  }
  #brand{display:flex;align-items:center;gap:10px;}
  #brand .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);}
  #brand h1{font-size:17px;margin:0;font-weight:700;letter-spacing:0.2px;}
  #brand .tag{font-size:11px;color:var(--text-dim);}

  #topbar-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  select, .btn, input[type=text]{
    font-family:'IBM Plex Sans',sans-serif;
    font-size:13px;
  }
  select{
    background:var(--surface-2);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 10px;
  }
  .btn{
    background:var(--surface-2);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 12px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition:border-color .15s, background .15s;
  }
  .btn:hover{border-color:#3A4552;background:#242D37;}
  .btn:active{transform:translateY(1px);}
  #docCount{color:var(--teal);font-weight:600;}

  /* ---- Doc drawer ---- */
  #docDrawer{
    display:none;
    position:fixed;top:0;right:0;height:100vh;width:320px;
    background:var(--surface);border-left:1px solid var(--border);
    z-index:50;padding:18px;overflow-y:auto;
  }
  #docDrawer.open{display:block;}
  #docDrawer h2{font-size:14px;margin:0 0 12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;}
  .docItem{
    background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
    padding:10px 12px;margin-bottom:8px;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px;
  }
  .docItem .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .docItem .rm{cursor:pointer;color:var(--danger);font-size:12px;flex-shrink:0;}
  #dropZone{
    border:1.5px dashed var(--border);border-radius:10px;padding:22px 12px;text-align:center;
    color:var(--text-dim);font-size:13px;cursor:pointer;margin-bottom:14px;transition:border-color .15s;
  }
  #dropZone:hover, #dropZone.drag{border-color:var(--teal);color:var(--teal);}
  #closeDrawer{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;}

  /* ---- Chat area ---- */
  #chat{
    flex:1;
    overflow-y:auto;
    padding:24px 0 12px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  #chatInner{width:100%;max-width:720px;padding:0 20px;}
  .empty{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;color:var(--text-dim);height:100%;margin-top:12vh;
  }
  .empty h2{color:var(--text);font-size:22px;margin-bottom:8px;}
  .empty p{font-size:14px;max-width:380px;line-height:1.6;}

  .msg{margin-bottom:22px;}
  .msg.user .bubble{
    background:var(--surface-2);border:1px solid var(--border);border-radius:12px 12px 4px 12px;
    padding:10px 14px;display:inline-block;max-width:85%;font-size:14.5px;
  }
  .msg.user{display:flex;justify-content:flex-end;}
  .msg.ai{max-width:100%;}
  .aiCard{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;
  }
  .aiCard .label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:4px;}
  .aiCard .answer{font-size:16px;font-weight:600;margin-bottom:10px;line-height:1.4;}
  .aiCard .explanation{font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap;}
  .aiCard .example{
    margin-top:10px;font-size:13px;background:var(--surface-2);border-left:3px solid var(--amber);
    padding:8px 12px;border-radius:0 6px 6px 0;white-space:pre-wrap;
  }
  .sourceChip{
    display:inline-flex;align-items:center;gap:6px;margin-top:12px;
    font-size:11px;padding:4px 10px;border-radius:20px;font-family:'IBM Plex Mono',monospace;
  }
  .sourceChip .sdot{width:6px;height:6px;border-radius:50%;}
  .src-doc{background:rgba(79,209,197,0.12);color:var(--teal);border:1px solid rgba(79,209,197,0.3);}
  .src-doc .sdot{background:var(--teal);}
  .src-web{background:rgba(192,132,252,0.12);color:var(--violet);border:1px solid rgba(192,132,252,0.3);}
  .src-web .sdot{background:var(--violet);}
  .src-both{background:rgba(232,163,61,0.12);color:var(--amber);border:1px solid rgba(232,163,61,0.3);}
  .src-both .sdot{background:var(--amber);}
  .loadingDots{display:flex;gap:4px;padding:4px 0;}
  .loadingDots span{width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:blink 1.2s infinite;}
  .loadingDots span:nth-child(2){animation-delay:.2s;}
  .loadingDots span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

  /* ---- Input bar ---- */
  #inputBar{
    flex-shrink:0;border-top:1px solid var(--border);background:var(--surface);
    padding:14px 20px 18px;display:flex;justify-content:center;
  }
  #inputInner{width:100%;max-width:720px;display:flex;align-items:center;gap:10px;}
  #textInput{
    flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:24px;
    padding:12px 18px;color:var(--text);font-size:14.5px;outline:none;transition:border-color .15s;
  }
  #textInput:focus{border-color:var(--teal);}
  #micBtn{
    position:relative;width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
    background:var(--surface-2);cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:background .15s,border-color .15s;
  }
  #micBtn svg{width:18px;height:18px;fill:var(--text-dim);z-index:2;}
  #micBtn.listening{background:rgba(232,163,61,0.15);border-color:var(--amber);}
  #micBtn.listening svg{fill:var(--amber);}
  .ring{
    position:absolute;border-radius:50%;border:1.5px solid var(--amber);opacity:0;
    top:0;left:0;right:0;bottom:0;
  }
  #micBtn.listening .ring{animation:pulse 1.6s ease-out infinite;}
  #micBtn.listening .ring2{animation-delay:.5s;}
  @keyframes pulse{
    0%{transform:scale(1);opacity:.6;}
    100%{transform:scale(1.9);opacity:0;}
  }
  #sendBtn{
    width:44px;height:44px;border-radius:50%;border:none;background:var(--teal);cursor:pointer;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;
  }
  #sendBtn svg{width:17px;height:17px;fill:#0E1318;}
  #sendBtn:disabled{opacity:.4;cursor:not-allowed;}
  #interimHint{font-size:11.5px;color:var(--amber);text-align:center;margin-top:6px;min-height:14px;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}

  @media (max-width:520px){
    #brand .tag{display:none;}
    #docDrawer{width:100%;}
  }
</style>
</head>
<body>

<div id="topbar">
  <div id="brand">
    <div class="dot"></div>
    <h1 class="display">Recall</h1>
    <span class="tag mono">voice-first knowledge assistant</span>
  </div>
  <div id="topbar-controls">
    <select id="roleSelect" class="mono">
      <option value="SAP IBP Consultant">SAP IBP Consultant</option>
      <option value="SAP S/4HANA Consultant">SAP S/4HANA Consultant</option>
      <option value="SAP MM Consultant">SAP MM Consultant</option>
      <option value="SAP SD Consultant">SAP SD Consultant</option>
      <option value="Supply Chain Professional">Supply Chain Professional</option>
      <option value="Business Analyst">Business Analyst</option>
      <option value="Data Analyst">Data Analyst</option>
      <option value="Data Scientist">Data Scientist</option>
      <option value="Project Manager">Project Manager</option>
      <option value="Product Manager">Product Manager</option>
      <option value="Scrum Master">Scrum Master</option>
      <option value="Software Developer">Software Developer</option>
      <option value="Cloud Engineer">Cloud Engineer</option>
      <option value="Finance Professional">Finance Professional</option>
      <option value="HR Professional">HR Professional</option>
      <option value="Student / Learner">Student / Learner</option>
      <option value="General">General</option>
      <option value="__custom__">✏️ Custom role…</option>
    </select>
    <input type="text" id="customRole" class="mono" placeholder="Type your role…"
      style="display:none;background:var(--surface-2);color:var(--text);border:1px solid var(--amber);border-radius:8px;padding:8px 10px;width:170px;font-size:13px;">
    <select id="langSelect" class="mono" title="Speech recognition language / accent">
      <option value="en-IN" selected>🎤 English (India)</option>
      <option value="en-US">🎤 English (US)</option>
      <option value="en-GB">🎤 English (UK)</option>
      <option value="en-AU">🎤 English (AU)</option>
      <option value="hi-IN">🎤 हिन्दी</option>
    </select>
    <select id="speedSelect" class="mono" title="Fast = quicker answers, Quality = deeper answers">
      <option value="fast">⚡ Fast</option>
      <option value="quality">◆ Quality</option>
    </select>
    <button class="btn" id="openDrawerBtn">
      📄 Documents (<span id="docCount">0</span>)
    </button>
    <button class="btn" id="keyBtn" title="Set your Anthropic API key">🔑 <span id="keyStatus">Set API key</span></button>
  </div>
</div>

<div id="docDrawer">
  <button id="closeDrawer">✕</button>
  <h2 class="mono">Knowledge Library</h2>
  <div id="dropZone">
    Click or drop files here<br>
    <span style="font-size:11px;">.txt · .md · .csv · .json · .pdf</span>
  </div>
  <input type="file" id="fileInput" multiple style="display:none" accept=".txt,.md,.csv,.json,.pdf">
  <div id="docList"></div>
</div>

<div id="chat">
  <div id="chatInner">
    <div class="empty" id="emptyState">
      <h2 class="display">Ask anything.</h2>
      <p>Upload your documents, then speak or type your question. I'll search your library first, and the web only if I need to.</p>
    </div>
  </div>
</div>

<div id="inputBar">
  <div style="width:100%;max-width:720px;">
    <div id="inputInner">
      <button id="micBtn" title="Click to speak">
        <span class="ring"></span>
        <span class="ring ring2"></span>
        <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 006 6.92V21h2v-3.08A7 7 0 0019 11h-2z"/></svg>
      </button>
      <input type="text" id="textInput" placeholder="Type or click the mic to speak...">
      <button id="sendBtn"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
    </div>
    <div id="interimHint"></div>
  </div>
</div>

<script>
// ---------------- API key ----------------
let apiKey = '';
try { apiKey = localStorage.getItem('anthropic_key') || ''; } catch(e) {}
const keyBtn = document.getElementById('keyBtn');
const keyStatus = document.getElementById('keyStatus');
function refreshKeyStatus(){
  keyStatus.textContent = apiKey ? 'API key set ✓' : 'Set API key';
  keyBtn.style.borderColor = apiKey ? 'rgba(79,209,197,0.5)' : '';
}
keyBtn.onclick = () => {
  const k = prompt('Paste your Anthropic API key (starts with sk-ant-...).\nStored only in this browser, never sent anywhere except api.anthropic.com.', apiKey || '');
  if(k !== null){
    apiKey = k.trim();
    try { localStorage.setItem('anthropic_key', apiKey); } catch(e) {}
    refreshKeyStatus();
  }
};
refreshKeyStatus();

// ---------------- State ----------------
let documents = []; // {id, name, text, chunks:[{text}]}
let chatHistory = []; // {role, content}
let isListening = false;
let recognition = null;
let silenceTimer = null;

const chatInner = document.getElementById('chatInner');
const emptyState = document.getElementById('emptyState');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const interimHint = document.getElementById('interimHint');
const docList = document.getElementById('docList');
const docCount = document.getElementById('docCount');
const roleSelect = document.getElementById('roleSelect');
const customRole = document.getElementById('customRole');
roleSelect.addEventListener('change', () => {
  const isCustom = roleSelect.value === '__custom__';
  customRole.style.display = isCustom ? 'inline-block' : 'none';
  if(isCustom) customRole.focus();
});
function getRole(){
  if(roleSelect.value === '__custom__'){
    return customRole.value.trim() || 'General';
  }
  return roleSelect.value;
}

// ---------------- Drawer ----------------
document.getElementById('openDrawerBtn').onclick = () => document.getElementById('docDrawer').classList.add('open');
document.getElementById('closeDrawer').onclick = () => document.getElementById('docDrawer').classList.remove('open');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.onclick = () => fileInput.click();
dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag'); };
dropZone.ondragleave = () => dropZone.classList.remove('drag');
dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('drag'); handleFiles(e.dataTransfer.files); };
fileInput.onchange = (e) => handleFiles(e.target.files);

async function handleFiles(files){
  for(const file of files){
    try{
      let text = '';
      if(file.name.toLowerCase().endsWith('.pdf')){
        text = await extractPdfText(file);
      } else {
        text = await file.text();
      }
      const chunks = chunkText(text);
      documents.push({id: Date.now()+Math.random(), name:file.name, text, chunks});
      renderDocs();
    }catch(err){
      console.error('File read error', err);
      alert('Could not read ' + file.name + '. Supported: txt, md, csv, json, pdf.');
    }
  }
}

async function extractPdfText(file){
  if(!window.pdfjsLib){
    await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({data: buf}).promise;
  let full = '';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    full += content.items.map(it=>it.str).join(' ') + '\n';
  }
  return full;
}

function loadScript(src){
  return new Promise((resolve,reject)=>{
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function chunkText(text, size=700){
  const clean = text.replace(/\s+/g,' ').trim();
  const chunks = [];
  for(let i=0;i<clean.length;i+=size){
    chunks.push(clean.slice(i, i+size));
  }
  return chunks;
}

function renderDocs(){
  docCount.textContent = documents.length;
  docList.innerHTML = '';
  documents.forEach(doc=>{
    const el = document.createElement('div');
    el.className = 'docItem';
    el.innerHTML = `<span class="name mono">${escapeHtml(doc.name)}</span><span class="rm" data-id="${doc.id}">remove</span>`;
    el.querySelector('.rm').onclick = () => {
      documents = documents.filter(d=>d.id!==doc.id);
      renderDocs();
    };
    docList.appendChild(el);
  });
}

function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// ---------------- Retrieval ----------------
function retrieveContext(query){
  const terms = query.toLowerCase().match(/[a-z0-9]+/g) || [];
  if(terms.length===0 || documents.length===0) return [];
  const scored = [];
  documents.forEach(doc=>{
    doc.chunks.forEach(chunk=>{
      const lower = chunk.toLowerCase();
      let score = 0;
      terms.forEach(t=>{ if(t.length>2 && lower.includes(t)) score++; });
      if(score>0) scored.push({doc:doc.name, text:chunk, score});
    });
  });
  scored.sort((a,b)=>b.score-a.score);
  return scored.slice(0,4);
}

// ---------------- Speech recognition ----------------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const PAUSE_MS = 2000;          // 2-second pause triggers the answer
let isAnswering = false;        // don't capture speech while AI is responding
let wakeLock = null;
let watchdog = null;
let lastSpeechActivity = 0;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  const langSelect = document.getElementById('langSelect');
  recognition.lang = langSelect.value; // defaults to en-IN for better Indian-accent accuracy
  langSelect.addEventListener('change', () => {
    recognition.lang = langSelect.value;
    // restart the session so the new language takes effect immediately
    if(isListening){ try{ recognition.stop(); }catch(e){} } // onend auto-restarts with new lang
  });

  recognition.onresult = (e) => {
    if(isAnswering) return; // ignore mic input while an answer is generating
    lastSpeechActivity = Date.now();
    let finalTranscript = '';
    let interim = '';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    if(finalTranscript) {
      textInput.value = (textInput.value + ' ' + finalTranscript).trim();
      resetSilenceTimer();
    }
    interimHint.textContent = interim ? interim : '';
    if(interim) resetSilenceTimer();
  };
  // Chrome silently ends recognition sessions every ~60s; restart immediately
  recognition.onend = () => {
    if(isListening){ setTimeout(()=>{ try{ recognition.start(); }catch(e){} }, 100); }
  };
  recognition.onerror = (e) => {
    console.warn('Speech recognition error', e.error);
    if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      interimHint.textContent = 'Microphone blocked — allow mic access in your browser.';
      stopListening();
    }
    // 'no-speech' and 'network' errors: onend fires next and auto-restarts
  };
} else {
  micBtn.title = 'Voice input not supported in this browser (try Chrome)';
}

function resetSilenceTimer(){
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(()=>{
    if(textInput.value.trim() && !isAnswering){
      submitQuestion(); // hands-free: mic stays ON, ready for the next question
    }
  }, PAUSE_MS);
}

micBtn.onclick = () => {
  if(!SpeechRecognition){ alert('Voice input needs Chrome or Edge.'); return; }
  if(isListening) stopListening();
  else startListening();
};

async function keepAwake(){
  // Prevent the screen from sleeping during long hands-free sessions
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){ console.warn('Wake lock unavailable', e); }
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && isListening) keepAwake();
});

function startListening(){
  isListening = true;
  micBtn.classList.add('listening');
  lastSpeechActivity = Date.now();
  try{ recognition.start(); }catch(e){}
  keepAwake();
  // Watchdog: every 20s, make sure the session is actually alive; restart if stalled
  clearInterval(watchdog);
  watchdog = setInterval(()=>{
    if(!isListening) return;
    try{ recognition.start(); }catch(e){ /* already running — fine */ }
  }, 20000);
}
function stopListening(){
  isListening = false;
  micBtn.classList.remove('listening');
  interimHint.textContent = '';
  clearTimeout(silenceTimer);
  clearInterval(watchdog);
  if(wakeLock){ try{ wakeLock.release(); }catch(e){} wakeLock = null; }
  try{ recognition.stop(); }catch(e){}
}

// ---------------- Send handling ----------------
textInput.addEventListener('keydown', (e) => {
  if(e.key==='Enter'){ submitQuestion(); }
});
sendBtn.onclick = () => submitQuestion();

function submitQuestion(){
  const q = textInput.value.trim();
  if(!q) return;
  textInput.value = '';
  interimHint.textContent = '';
  emptyState.style.display = 'none';
  addUserMessage(q);
  askAI(q);
}

function addUserMessage(text){
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chatInner.appendChild(div);
  scrollToBottom();
}

function addAiPlaceholder(){
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="aiCard"><div class="loadingDots"><span></span><span></span><span></span></div></div>`;
  chatInner.appendChild(div);
  scrollToBottom();
  return div;
}

function scrollToBottom(){
  const chat = document.getElementById('chat');
  chat.scrollTop = chat.scrollHeight;
}

// ---------------- AI call ----------------
async function askAI(question){
  const placeholder = addAiPlaceholder();
  const contextChunks = retrieveContext(question);
  const hasDocContext = contextChunks.length > 0;
  const role = getRole();

  const contextBlock = hasDocContext
    ? contextChunks.map((c,i)=>`[Chunk ${i+1} from "${c.doc}"]\n${c.text}`).join('\n\n')
    : '(No relevant content found in the user\'s uploaded documents.)';

  const systemPrompt = `You are Recall, a concise knowledge assistant working strictly within the domain of a ${role}.

ROLE SCOPE (strict):
- Interpret every question in the context of the ${role} domain. If a term has multiple meanings, ALWAYS use the meaning relevant to a ${role}. (e.g. for an SAP IBP Consultant, "heuristic" means the IBP supply planning heuristic, never the general computer-science term.)
- When searching the web, search for the term as it applies to the ${role} domain specifically.
- If the question is completely unrelated to the ${role} domain, give a one-line answer and add: "Note: this is outside your selected role (${role})."

Answer the user's question using this priority order:
1. If DOCUMENT CONTEXT below answers the question, use ONLY that.
2. If DOCUMENT CONTEXT is missing, empty, or insufficient, use the web_search tool to find a trustworthy, current answer.
3. If both are needed, combine them.

Respond in this exact format, nothing extra:
Answer: <one direct sentence>
Explanation: <2-5 concise lines>
Example: <only include this line if a concrete example genuinely helps, otherwise omit>
Source: <one of exactly these three: "Documents" or "Internet" or "Documents + Internet" — reflecting what you actually used>

DOCUMENT CONTEXT:
${contextBlock}`;

  if(!apiKey){
    placeholder.querySelector('.aiCard').innerHTML = `<div class="label">API KEY NEEDED</div><div class="explanation">Click the 🔑 button in the top bar and paste your Anthropic API key (get one at console.anthropic.com → API Keys). Voice and documents work without it — only AI answers need the key.</div>`;
    return;
  }
  isAnswering = true;
  const speed = document.getElementById('speedSelect').value;
  const model = speed === 'fast' ? 'claude-haiku-4-5' : 'claude-sonnet-4-6';
  // Strong doc matches → skip web search entirely (saves 2-5 seconds)
  const strongDocMatch = contextChunks.length >= 2 && contextChunks[0].score >= 3;
  const tools = strongDocMatch ? [] : [{ type: "web_search_20250305", name: "web_search" }];

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: model,
        max_tokens: 500,
        stream: true,
        system: systemPrompt,
        messages: [{ role: "user", content: question }],
        tools: tools
      })
    });

    if(!response.ok){
      let errMsg = 'HTTP ' + response.status;
      try{ const errData = await response.json(); errMsg = (errData.error && errData.error.message) || errMsg; }catch(e){}
      placeholder.querySelector('.aiCard').innerHTML = `<div class="label">API ERROR</div><div class="explanation">${escapeHtml(errMsg)}</div><div class="explanation" style="margin-top:8px;color:#8A94A0;">Most common cause: no credits on your account. Add credits at platform.claude.com → Billing.</div>`;
      return;
    }

    // ---- Stream the answer live ----
    const card = placeholder.querySelector('.aiCard');
    card.innerHTML = `<div class="label mono">RESPONSE</div><div class="explanation streamText"></div>`;
    const streamTarget = card.querySelector('.streamText');
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let raw = '';
    let usedWebSearch = false;
    let buffer = '';
    let searching = false;

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, {stream:true});
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for(const line of lines){
        if(!line.startsWith('data:')) continue;
        const payload = line.slice(5).trim();
        if(!payload || payload === '[DONE]') continue;
        let ev;
        try{ ev = JSON.parse(payload); }catch(e){ continue; }
        if(ev.type === 'content_block_start' && ev.content_block && ev.content_block.type === 'server_tool_use'){
          usedWebSearch = true;
          searching = true;
          streamTarget.textContent = raw + '\n\n🔎 Searching the web…';
        }
        if(ev.type === 'content_block_delta' && ev.delta && ev.delta.type === 'text_delta'){
          raw += ev.delta.text;
          searching = false;
          streamTarget.textContent = raw;
          scrollToBottom();
        }
        if(ev.type === 'error'){
          streamTarget.textContent = 'Stream error: ' + ((ev.error && ev.error.message) || 'unknown');
        }
      }
    }

    if(!raw.trim()){
      card.innerHTML = `<div class="label">EMPTY RESPONSE</div><div class="explanation">The API responded but returned no text. Please try again.</div>`;
      return;
    }
    renderAiResponse(placeholder, raw, hasDocContext, usedWebSearch);
  }catch(err){
    console.error(err);
    placeholder.querySelector('.aiCard').innerHTML = `<div class="label">ERROR</div><div class="explanation">Something went wrong reaching the AI. Please try again.</div>`;
  }finally{
    isAnswering = false;
    textInput.value = '';
    if(isListening) interimHint.textContent = '🎤 Listening — ask your next question…';
  }
}

function renderAiResponse(placeholder, raw, hasDocContext, usedWebSearch){
  // Parse fields
  const answerMatch = raw.match(/Answer:\s*([\s\S]*?)(?=\nExplanation:|$)/i);
  const explMatch = raw.match(/Explanation:\s*([\s\S]*?)(?=\nExample:|\nSource:|$)/i);
  const exMatch = raw.match(/Example:\s*([\s\S]*?)(?=\nSource:|$)/i);
  const srcMatch = raw.match(/Source:\s*(Documents \+ Internet|Documents|Internet)/i);

  const answer = answerMatch ? answerMatch[1].trim() : raw.trim();
  const explanation = explMatch ? explMatch[1].trim() : '';
  const example = exMatch ? exMatch[1].trim() : '';
  let source = srcMatch ? srcMatch[1] : (hasDocContext && usedWebSearch ? 'Documents + Internet' : hasDocContext ? 'Documents' : 'Internet');

  let srcClass = 'src-doc', srcLabel = '✓ Uploaded Documents';
  if(/internet/i.test(source) && /documents/i.test(source)){ srcClass='src-both'; srcLabel='✓ Documents + Internet'; }
  else if(/internet/i.test(source)){ srcClass='src-web'; srcLabel='✓ Internet'; }
  else { srcClass='src-doc'; srcLabel='✓ Uploaded Documents'; }

  let html = `<div class="label mono">RESPONSE</div>`;
  html += `<div class="answer">${escapeHtml(answer)}</div>`;
  if(explanation) html += `<div class="explanation">${escapeHtml(explanation)}</div>`;
  if(example) html += `<div class="example mono">${escapeHtml(example)}</div>`;
  html += `<div class="sourceChip ${srcClass}"><span class="sdot"></span>${srcLabel}</div>`;

  placeholder.querySelector('.aiCard').innerHTML = html;
  scrollToBottom();
}
</script>
</body>
</html>
